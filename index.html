/**
 * ENEMY AI v2
 * Picks appropriate targets when abilities require them.
 */



class EnemyAI {
  constructor(engine) { this.engine = engine; }

  // Choose a target for a targeting ability from AI's perspective
  pickTargetFor(ability, side) {
    const eng = this.engine;
    if (!ability?.needsTarget) return null;

    const who = 'enemy';
    const field = ability.targetSide === 'ally' ? eng.state.enemy.field : eng.state.player.field;
    if (field.length === 0) return null;

    if (ability.targetSide === 'enemy') {
      // Target highest-threat enemy paso
      return [...field].sort((a, b) => b.currentAtk - a.currentAtk)[0].instanceId;
    } else {
      // Buff our strongest
      return [...field].sort((a, b) => b.currentAtk - a.currentAtk)[0].instanceId;
    }
  }

  async takeTurn() {
    const eng = this.engine;
    const state = eng.state;

    // Play cards (highest cost first)
    const hand = [...state.enemy.hand].sort((a, b) => b.cost - a.cost);
    for (const card of hand) {
      if (!eng.canPlayCard('enemy', card)) continue;
      const ab = getAbility(card.ability);
      const targetId = ab?.needsTarget ? this.pickTargetFor(ab, 'enemy') : null;
      // Skip if needs target but none available
      if (ab?.needsTarget && !targetId) continue;
      eng.playCard('enemy', card.instanceId, targetId);
      await delay(700);
      if (state.winner) return;
    }

    // Hero power if beneficial
    if (Math.random() < 0.7 && eng.canUsePower('enemy')) {
      const pwAb = getAbility(state.enemy.hermandad.power.effect);
      const targetId = pwAb?.needsTarget ? this.pickTargetFor(pwAb, 'enemy') : null;
      if (!pwAb?.needsTarget || targetId) {
        eng.usePower('enemy', targetId);
        await delay(500);
        if (state.winner) return;
      }
    }

    // Attacks
    const attackers = [...state.enemy.field].filter(c => !c.sleeping && !c.hasAttacked && c.currentAtk > 0);
    for (const attacker of attackers) {
      const current = state.enemy.field.find(c => c.instanceId === attacker.instanceId);
      if (!current || !eng.canAttack(current)) continue;
      const target = this.chooseTarget(current);
      if (target === 'hero') {
        eng.attack('enemy', current.instanceId, null);
      } else if (target) {
        eng.attack('enemy', current.instanceId, target.instanceId);
      }
      await delay(650);
      if (state.winner) return;
    }

    await delay(300);
    eng.endTurn();
  }

  chooseTarget(attacker) {
    const eng = this.engine;
    const playerField = eng.state.player.field;

    const taunts = playerField.filter(c => {
      const ab = getAbility(c.ability);
      return ab?.isTaunt && !c.silenced;
    });
    if (taunts.length > 0) {
      return [...taunts].sort((a, b) => a.currentHealth - b.currentHealth)[0];
    }

    if (playerField.length > 0 && Math.random() < 0.6) {
      return [...playerField].sort((a, b) => b.currentAtk - a.currentAtk)[0];
    }

    return 'hero';
  }
}

/**
 * AUDIO ENGINE
 * Synthesized sound effects via Web Audio API.
 * Subscribes to game events — no direct coupling with engine or UI.
 */



class AudioEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.5;
      this.master.connect(this.ctx.destination);
      this.initialized = true;
    } catch (e) {
      console.warn('[Audio] Not supported', e);
    }
  }

  get enabled() {
    return player.state.audioEnabled;
  }

  toggle() {
    player.setAudioEnabled(!this.enabled);
  }

  resume() {
    if (this.ctx?.state === 'suspended') this.ctx.resume();
  }

  play(name) {
    if (!this.enabled) return;
    this.init();
    if (!this.ctx) return;
    this.resume();

    const patterns = this.patterns();
    const pattern = patterns[name];
    if (pattern) pattern(this.ctx, this.master);
  }

  patterns() {
    return {
      click: (ctx, out) => this.tone(ctx, out, 'sine', 1200, 0.05, 0.05),
      cardPlay: (ctx, out) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(out);
        o.type = 'sine';
        const now = ctx.currentTime;
        o.frequency.setValueAtTime(440, now);
        o.frequency.exponentialRampToValueAtTime(880, now + 0.1);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        o.start(now); o.stop(now + 0.25);
      },
      attack: (ctx, out) => {
        const o1 = ctx.createOscillator(), o2 = ctx.createOscillator(), g = ctx.createGain();
        o1.connect(g); o2.connect(g); g.connect(out);
        o1.type = 'sawtooth'; o2.type = 'triangle';
        const now = ctx.currentTime;
        o1.frequency.setValueAtTime(200, now);
        o1.frequency.exponentialRampToValueAtTime(50, now + 0.2);
        o2.frequency.setValueAtTime(150, now);
        o2.frequency.exponentialRampToValueAtTime(40, now + 0.2);
        g.gain.setValueAtTime(0.35, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        o1.start(now); o2.start(now); o1.stop(now + 0.3); o2.stop(now + 0.3);
      },
      hit: (ctx, out) => {
        const o = ctx.createOscillator(), g = ctx.createGain(), ns = ctx.createBufferSource();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
        ns.buffer = buf;
        o.connect(g); ns.connect(g); g.connect(out);
        o.type = 'square';
        const now = ctx.currentTime;
        o.frequency.setValueAtTime(100, now);
        o.frequency.exponentialRampToValueAtTime(30, now + 0.1);
        g.gain.setValueAtTime(0.4, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.start(now); ns.start(now); o.stop(now + 0.15);
      },
      heal: (ctx, out) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(out);
        o.type = 'sine';
        const now = ctx.currentTime;
        o.frequency.setValueAtTime(523, now);
        o.frequency.linearRampToValueAtTime(784, now + 0.15);
        o.frequency.linearRampToValueAtTime(1046, now + 0.3);
        g.gain.setValueAtTime(0.25, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        o.start(now); o.stop(now + 0.55);
      },
      power: (ctx, out) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(out);
        o.type = 'triangle';
        const now = ctx.currentTime;
        o.frequency.setValueAtTime(440, now);
        o.frequency.linearRampToValueAtTime(660, now + 0.2);
        o.frequency.linearRampToValueAtTime(880, now + 0.4);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        o.start(now); o.stop(now + 0.5);
      },
      win: (ctx, out) => {
        const notes = [523, 659, 784, 1046];
        const now = ctx.currentTime;
        notes.forEach((f, i) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(out);
          o.type = 'triangle';
          o.frequency.setValueAtTime(f, now + i * 0.12);
          g.gain.setValueAtTime(0.3, now + i * 0.12);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.3);
          o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.35);
        });
      },
      lose: (ctx, out) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(out);
        o.type = 'triangle';
        const now = ctx.currentTime;
        o.frequency.setValueAtTime(440, now);
        o.frequency.linearRampToValueAtTime(110, now + 0.8);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
        o.start(now); o.stop(now + 0.9);
      },
      turn: (ctx, out) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(out);
        o.type = 'sine';
        const now = ctx.currentTime;
        o.frequency.setValueAtTime(330, now);
        o.frequency.linearRampToValueAtTime(440, now + 0.08);
        g.gain.setValueAtTime(0.18, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        o.start(now); o.stop(now + 0.2);
      },
      pack: (ctx, out) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        const lfo = ctx.createOscillator(), lfoGain = ctx.createGain();
        lfo.connect(lfoGain); lfoGain.connect(o.frequency);
        o.connect(g); g.connect(out);
        const now = ctx.currentTime;
        lfo.frequency.setValueAtTime(10, now); lfoGain.gain.setValueAtTime(50, now);
        o.type = 'sine';
        o.frequency.setValueAtTime(660, now);
        o.frequency.exponentialRampToValueAtTime(1320, now + 0.4);
        g.gain.setValueAtTime(0.22, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        o.start(now); lfo.start(now); o.stop(now + 0.6); lfo.stop(now + 0.6);
      },
      reveal: (ctx, out) => {
        const f = [660, 880, 1100];
        const now = ctx.currentTime;
        f.forEach((fr, i) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(out);
          o.type = 'triangle';
          o.frequency.setValueAtTime(fr, now + i * 0.05);
          g.gain.setValueAtTime(0.2, now + i * 0.05);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.2);
          o.start(now + i * 0.05); o.stop(now + i * 0.05 + 0.25);
        });
      },
      legendary: (ctx, out) => {
        const notes = [523, 659, 784, 1046, 1318];
        const now = ctx.currentTime;
        notes.forEach((f, i) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(out);
          o.type = 'sine';
          o.frequency.setValueAtTime(f, now + i * 0.08);
          g.gain.setValueAtTime(0.28, now + i * 0.08);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.4);
          o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.5);
        });
      }
    };
  }

  tone(ctx, out, type, freq, volume, dur) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(out);
    o.type = type;
    const now = ctx.currentTime;
    o.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(volume, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    o.start(now); o.stop(now + dur + 0.05);
  }
}

const audio = new AudioEngine();

// Wire up event listeners - audio reacts to game events
bus.on(EVENTS.CARD_PLAYED, () => audio.play('cardPlay'));
bus.on(EVENTS.CARD_ATTACKED, (e) => {
  audio.play('attack');
  setTimeout(() => audio.play('hit'), 200);
});
bus.on(EVENTS.HEAL_APPLIED, () => audio.play('heal'));
bus.on(EVENTS.POWER_USED, () => audio.play('power'));
bus.on(EVENTS.SPELL_CAST, () => audio.play('power'));
bus.on(EVENTS.TURN_STARTED, () => audio.play('turn'));
bus.on(EVENTS.GAME_OVER, (e) => {
  setTimeout(() => audio.play(e.winner === 'player' ? 'win' : 'lose'), 400);
});

// audio/music.js
// ═══════════════════════════════════════════
/**
 * BACKGROUND MUSIC
 * Plays looping soundtrack with smooth crossfades between tracks.
 *
 * Two tracks:
 *  - 'intro'   → all menu screens (home, campaign, packs, deck, collection, qp)
 *  - 'battle'  → during battles only
 *
 * Respects the same mute toggle as the SFX engine (player.state.audioEnabled).
 */



const TRACKS = {
  intro: './intro.mp3',
  battle: './batalla.mp3'
};

const TARGET_VOLUME = 0.35; // music is softer than SFX so it doesn't drown them out
const FADE_STEPS = 20;
const FADE_STEP_MS = 30;

class MusicEngine {
  constructor() {
    this.elements = {};        // { intro: HTMLAudioElement, battle: ... }
    this.current = null;       // id of currently-playing track
    this.fadeTimers = new Map();
    this.initialized = false;
    this.pendingTrack = null;  // track requested before user interaction unlocked audio
  }

  /**
   * Preload both tracks. Must be called after user interaction on mobile
   * (browsers block autoplay until the first gesture).
   */
  init() {
    if (this.initialized) return;
    for (const [id, src] of Object.entries(TRACKS)) {
      const a = new Audio(src);
      a.loop = true;
      a.preload = 'auto';
      a.volume = 0;
      a.addEventListener('error', (e) => {
        console.warn(`[Music] Failed to load ${id}:`, a.error?.message || e);
      });
      this.elements[id] = a;
    }
    this.initialized = true;

    // If the user requested a track before init, play it now
    if (this.pendingTrack) {
      const t = this.pendingTrack;
      this.pendingTrack = null;
      this.play(t);
    }
  }

  get enabled() {
    return player.state.audioEnabled;
  }

  /**
   * Switch to the named track, crossfading from whatever is currently playing.
   */
  play(trackId) {
    if (!this.initialized) {
      this.pendingTrack = trackId;
      return;
    }
    if (!this.enabled) {
      // Still track which track is "intended" so unmuting resumes correctly
      this.current = trackId;
      return;
    }
    if (this.current === trackId) {
      // Already playing this — just make sure it's actually playing and audible
      const el = this.elements[trackId];
      if (el && el.paused) el.play().catch(() => {});
      this.fadeTo(trackId, TARGET_VOLUME);
      return;
    }
    const prev = this.current;
    this.current = trackId;

    // Fade out previous
    if (prev && this.elements[prev]) {
      this.fadeTo(prev, 0, () => {
        const p = this.elements[prev];
        if (p) { p.pause(); p.currentTime = 0; }
      });
    }

    // Start + fade in new
    const next = this.elements[trackId];
    if (!next) return;
    next.currentTime = 0;
    next.volume = 0;
    const promise = next.play();
    if (promise) promise.catch(err => {
      // Autoplay blocked — will unlock on next user gesture
      console.warn('[Music] autoplay blocked:', err.name);
    });
    this.fadeTo(trackId, TARGET_VOLUME);
  }

  /**
   * Stop all music (e.g. user muted).
   */
  stopAll() {
    for (const el of Object.values(this.elements)) {
      if (!el.paused) { el.pause(); el.currentTime = 0; }
      el.volume = 0;
    }
    for (const t of this.fadeTimers.values()) clearInterval(t);
    this.fadeTimers.clear();
  }

  /**
   * Called when audio toggle flips. Resume or stop the "current" track.
   */
  onAudioToggle() {
    if (this.enabled && this.current) {
      const el = this.elements[this.current];
      if (el) {
        if (el.paused) el.play().catch(() => {});
        this.fadeTo(this.current, TARGET_VOLUME);
      }
    } else {
      this.stopAll();
    }
  }

  fadeTo(trackId, targetVol, onDone) {
    const el = this.elements[trackId];
    if (!el) return;
    const existing = this.fadeTimers.get(trackId);
    if (existing) clearInterval(existing);

    const startVol = el.volume;
    const delta = (targetVol - startVol) / FADE_STEPS;
    let step = 0;
    const timer = setInterval(() => {
      step++;
      el.volume = Math.max(0, Math.min(1, startVol + delta * step));
      if (step >= FADE_STEPS) {
        clearInterval(timer);
        this.fadeTimers.delete(trackId);
        el.volume = targetVol;
        onDone?.();
      }
    }, FADE_STEP_MS);
    this.fadeTimers.set(trackId, timer);
  }
}

/**
 * DOM HELPERS
 * Small utilities to keep view code readable.
 */

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];

const el = (tag, { cls, id, html, text, attrs, style, on } = {}, children = []) => {
  const node = document.createElement(tag);
  if (cls) node.className = Array.isArray(cls) ? cls.filter(Boolean).join(' ') : cls;
  if (id) node.id = id;
  if (html !== undefined) node.innerHTML = html;
  if (text !== undefined) node.textContent = text;
  if (attrs) for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  if (style) Object.assign(node.style, style);
  if (on) for (const [k, v] of Object.entries(on)) node.addEventListener(k, v);
  for (const c of [].concat(children)) {
    if (c == null || c === false) continue;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
};

const clear = (node) => { while (node.firstChild) node.removeChild(node.firstChild); };

const press = (node, handler, holdMs = 500) => {
  let t = null;
  let longPressed = false;

  const start = () => {
    longPressed = false;
    t = setTimeout(() => { longPressed = true; handler({ type: 'long' }); t = null; }, holdMs);
  };
  const end = () => { if (t) { clearTimeout(t); t = null; } };
  const click = () => { if (!longPressed) handler({ type: 'tap' }); };

  node.addEventListener('mousedown', start);
  node.addEventListener('mouseup', end);
  node.addEventListener('mouseleave', end);
  node.addEventListener('touchstart', start, { passive: true });
  node.addEventListener('touchend', end);
  node.addEventListener('touchcancel', end);
  node.addEventListener('click', click);
};

/**
 * BATTLE EFFECTS
 * All visual flourish that makes attacks and plays feel impactful.
 * Subscribes to engine events and spawns DOM effects accordingly.
 */



const rootId = 'app';
function root() { return document.getElementById(rootId); }

function positionAt(fx, targetEl, xOffset = 0, yOffset = 0) {
  if (!targetEl) return;
  const r = targetEl.getBoundingClientRect();
  const cr = root().getBoundingClientRect();
  fx.style.left = `${r.left - cr.left + r.width / 2 + xOffset}px`;
  fx.style.top = `${r.top - cr.top + r.height / 2 + yOffset}px`;
}

function showDamageNumber(targetEl, amount) {
  if (!targetEl || amount <= 0) return;
  const fx = el('div', { cls: 'fx-damage', text: `-${amount}` });
  root().appendChild(fx);
  positionAt(fx, targetEl, -14, -20);
  setTimeout(() => fx.remove(), 1200);
}

function showHealNumber(targetEl, amount) {
  if (!targetEl || amount <= 0) return;
  const fx = el('div', { cls: 'fx-heal', text: `+${amount}` });
  root().appendChild(fx);
  positionAt(fx, targetEl, -12, -10);
  setTimeout(() => fx.remove(), 1200);
}

function flashScreen(variant = 'dmg') {
  const f = el('div', { cls: ['fx-flash', `fx-flash--${variant}`] });
  root().appendChild(f);
  setTimeout(() => f.remove(), 400);
}

function shakeCard(cardEl) {
  if (!cardEl) return;
  cardEl.classList.add('is-damaged');
  setTimeout(() => cardEl.classList.remove('is-damaged'), 500);
}

function pulseHpOrb(side, variant = 'damaged') {
  const orb = document.querySelector(`.hp-orb--${side} .hp-orb__hp`);
  if (!orb) return;
  orb.classList.add(`is-${variant}`);
  setTimeout(() => orb.classList.remove(`is-${variant}`), 600);
}

function attackBeam(fromEl, toEl) {
  if (!fromEl || !toEl) return;
  const cr = root().getBoundingClientRect();
  const fr = fromEl.getBoundingClientRect();
  const tr = toEl.getBoundingClientRect();
  const x1 = fr.left - cr.left + fr.width / 2;
  const y1 = fr.top - cr.top + fr.height / 2;
  const x2 = tr.left - cr.left + tr.width / 2;
  const y2 = tr.top - cr.top + tr.height / 2;
  const dx = x2 - x1;
  const dy = y2 - y1;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  const beam = el('div', { cls: 'fx-beam' });
  beam.style.left = `${x1}px`;
  beam.style.top = `${y1}px`;
  beam.style.width = `${dist}px`;
  beam.style.transform = `rotate(${angle}deg)`;
  root().appendChild(beam);
  setTimeout(() => beam.remove(), 500);

  // Particle burst
  const colors = ['#e8c547', '#ffd966', '#E24B4A', '#ff8844'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const size = Math.random() * 6 + 4;
      const particle = el('div', {
        cls: 'fx-particle',
        style: {
          width: `${size}px`, height: `${size}px`,
          background: colors[Math.floor(Math.random() * colors.length)],
          left: `${x2 - size / 2}px`, top: `${y2 - size / 2}px`
        }
      });
      particle.style.setProperty('--tx', `${Math.random() * 100 - 50}px`);
      particle.style.setProperty('--ty', `${Math.random() * 100 - 50}px`);
      root().appendChild(particle);
      setTimeout(() => particle.remove(), 1000);
    }, i * 22);
  }
}

function launchCardToField(fromEl, toPlaceholder) {
  if (!fromEl) return Promise.resolve();
  return new Promise((resolve) => {
    const fr = fromEl.getBoundingClientRect();
    const clone = fromEl.cloneNode(true);
    clone.classList.add('card-launching');
    clone.classList.remove('is-clicked', 'is-awaiting-target');
    clone.style.left = `${fr.left}px`;
    clone.style.top = `${fr.top}px`;
    clone.style.width = `${fr.width}px`;
    clone.style.height = `${fr.height}px`;
    clone.style.transform = 'scale(1)';
    document.body.appendChild(clone);
    fromEl.style.opacity = '0';

    requestAnimationFrame(() => {
      const targetRect = toPlaceholder?.getBoundingClientRect();
      if (targetRect) {
        clone.style.left = `${targetRect.left + targetRect.width / 2 - fr.width / 2}px`;
        clone.style.top = `${targetRect.top + targetRect.height / 2 - fr.height / 2}px`;
      } else {
        // Fallback: launch up and fade
        clone.style.top = `${fr.top - 200}px`;
        clone.style.opacity = '0';
      }
      clone.style.transform = 'scale(1.15) rotate(5deg)';
    });

    setTimeout(() => {
      clone.remove();
      resolve();
    }, 550);
  });
}

/**
 * Auto-listen to engine events and trigger effects.
 */
function installBattleFx() {
  bus.on(EVENTS.CARD_ATTACKED, ({ attacker, target, side, damage, counterDamage, divineNegated }) => {
    const atkSide = side;
    const defSide = side === 'player' ? 'enemy' : 'player';
    const attackerEl = document.getElementById(`fc-${atkSide}-${attacker.instanceId}`);

    if (target === 'hero') {
      const heroEl = document.querySelector(`.hp-orb--${defSide}`);
      attackBeam(attackerEl, heroEl);
      setTimeout(() => {
        showDamageNumber(heroEl, damage);
        pulseHpOrb(defSide, 'damaged');
        flashScreen('dmg');
      }, 300);
    } else if (divineNegated) {
      const targetEl = document.getElementById(`fc-${defSide}-${target.instanceId}`);
      flashScreen('gold');
      if (targetEl) {
        targetEl.style.transition = 'box-shadow 0.3s';
        targetEl.style.boxShadow = '0 0 40px rgba(232,197,71,1)';
        setTimeout(() => { targetEl.style.boxShadow = ''; }, 700);
      }
    } else {
      const targetEl = document.getElementById(`fc-${defSide}-${target.instanceId}`);
      attackBeam(attackerEl, targetEl);
      setTimeout(() => {
        if (damage > 0) showDamageNumber(targetEl, damage);
        if (counterDamage > 0) showDamageNumber(attackerEl, counterDamage);
        shakeCard(targetEl);
        shakeCard(attackerEl);
      }, 300);
    }
  });

  bus.on(EVENTS.HEAL_APPLIED, ({ target, who, amount }) => {
    if (amount <= 0) return;
    if (target === 'hero') {
      const orb = document.querySelector(`.hp-orb--${who}`);
      showHealNumber(orb, amount);
      pulseHpOrb(who, 'healed');
      flashScreen('heal');
    }
  });

  bus.on(EVENTS.SPELL_CAST, () => flashScreen('gold'));
  bus.on(EVENTS.POWER_USED, () => flashScreen('gold'));
  bus.on(EVENTS.DAMAGE_DEALT, ({ target, who, amount }) => {
    if (target === 'hero' && amount > 0) {
      const orb = document.querySelector(`.hp-orb--${who}`);
      showDamageNumber(orb, amount);
      pulseHpOrb(who, 'damaged');
    }
  });
}

// TARGETING SYSTEM
// Describes which cards/spells need a user-picked target, and
// what kind of target is valid.
// ═══════════════════════════════════════════════════════════════
const TARGETING = {
  // abilityId -> { side: 'ally'|'enemy', kind: 'paso'|'hero'|'any' }
  buff_hp_single: { side: 'ally', kind: 'paso' },       // Manto → pick your paso to buff
  debuff_single: { side: 'enemy', kind: 'paso' },       // Lagrimas → pick enemy to debuff
  silencio_enter: { side: 'enemy', kind: 'paso' },      // Mortaja on-enter → pick to silence
  lagrimas: { side: 'enemy', kind: 'paso' },            // Macarena on-enter
  // Hero powers that need a target
  power_majestad: { side: 'ally', kind: 'paso' },       // pick your paso for +2 atk
  power_lagrimas: { side: 'enemy', kind: 'paso' },      // pick enemy for -2 atk
  power_rivalidad: { side: 'ally', kind: 'paso' },      // pick ally for +1/+1
  power_silencio: { side: 'enemy', kind: 'paso' }       // pick enemy to silence
};

class BattleController {
  constructor(rootEl, { onFinish, inspectHandler }) {
    this.rootEl = rootEl;
    this.onFinish = onFinish;
    this.inspectHandler = inspectHandler;
    this.engine = null;
    this.ai = null;
    this.unsubs = [];
    this.state = {
      selectedAttackerId: null,
      awaitingTarget: null, // { type: 'spell'|'power'|'onEnter', source, validator }
      inspectedCardId: null, // hand-card instance id currently inspected via modal
      inspectedCardEl: null,
      inspectBackdropHandler: null,
      logTimer: null,
      scene: 'noche'
    };
    this.onViewportChange = () => {
      this.layoutCompactPlayerHand();
      fitInspectCardToViewport();
    };
    window.addEventListener('resize', this.onViewportChange);
    window.addEventListener('orientationchange', this.onViewportChange);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', this.onViewportChange);
    }
  }

  // ═════════════ LIFECYCLE ═════════════

  start(config) {
    this.state.scene = config.scene || 'noche';

    // Switch soundtrack to battle theme before the cinematic
    music.play('battle');

    // Show VS intro, then build the arena
    const playerHerm = { name: config.playerHermandad.name, symbol: config.playerHermandad.symbol, day: config.playerHermandad.day };
    const enemyHerm = { name: config.enemyHermandad.name, symbol: config.enemyHermandad.symbol, day: config.enemyHermandad.day || 'RIVAL' };

    playVsIntro(playerHerm, enemyHerm, this.state.scene, () => {
      this.buildShell();

      this.engine = new GameEngine({
        playerHermandadId: config.playerHermandadId,
        playerDeck: config.playerDeck,
        enemyHermandadId: config.enemyHermandadId,
        enemyDeck: config.enemyDeck,
        isCampaign: config.isCampaign,
        campaignDayId: config.campaignDayId
      });
      this.ai = new EnemyAI(this.engine);

      this.installListeners();
      this.engine.start();
      this.render();
    });
  }

  buildShell() {
    clear(this.rootEl);

    // Atmospheric background
    const bg = el('div', { cls: 'battle-bg' }, [
      el('div', { cls: 'battle-bg__sky' }),
      el('div', { cls: 'battle-bg__moon' }),
      this.buildStars(),
      this.buildCandles(),
      this.buildSmoke(),
      el('div', { cls: 'battle-bg__overlay' })
    ]);

    // HP orbs (absolutely positioned)
    const enemyOrb = el('div', { cls: 'hp-orb hp-orb--enemy' }, [
      el('div', { cls: 'hp-orb__avatar', id: 'e-avi', text: '✞' }),
      el('div', { cls: 'hp-orb__info' }, [
        el('div', { cls: 'hp-orb__name', id: 'e-name', text: 'RIVAL' }),
        el('div', { cls: 'hp-orb__role', text: 'RIVAL' }),
        el('div', { cls: 'hp-orb__hp' }, [
          el('span', { id: 'e-hp', text: '30' }),
          el('span', { cls: 'hp-orb__hp-max', text: '/30' })
        ]),
        el('div', { cls: 'hp-orb__decks' }, [
          el('span', { id: 'e-deck', text: '0' }), 'm · ',
          el('span', { id: 'e-hand-count', text: '0' }), 'h'
        ]),
        el('div', { cls: 'mana-bar', id: 'e-mana' })
      ])
    ]);

    const playerOrb = el('div', { cls: 'hp-orb hp-orb--player' }, [
      el('div', { cls: 'hp-orb__avatar', id: 'p-avi', text: '✞' }),
      el('div', { cls: 'hp-orb__info' }, [
        el('div', { cls: 'hp-orb__name', id: 'p-name', text: 'TU' }),
        el('div', { cls: 'hp-orb__role', text: 'JUGADOR' }),
        el('div', { cls: 'hp-orb__hp' }, [
          el('span', { id: 'p-hp', text: '30' }),
          el('span', { cls: 'hp-orb__hp-max', text: '/30' })
        ]),
        el('div', { cls: 'hp-orb__decks' }, [
          el('span', { id: 'p-deck', text: '0' }), 'm · ',
          el('span', { id: 'p-hand-count', text: '0' }), 'h'
        ]),
        el('div', { cls: 'mana-bar', id: 'p-mana' })
      ])
    ]);

    // Arena grid
    const arena = el('div', { cls: 'arena' }, [
      el('div', { cls: 'enemy-hand', id: 'enemy-hand' }),
      el('div', { cls: 'field-zone field-zone--enemy', id: 'e-field' }),
      el('div', { cls: 'field-zone field-zone--player', id: 'p-field' }),
      this.buildHandArea()
    ]);

    // Mid controls (end-turn button center-right)
    const midControls = el('div', { cls: 'mid-controls' }, [
      el('button', {
        cls: 'turn-btn', id: 'turn-btn', text: 'FIN TURNO',
        on: { click: () => this.onEndTurnClick() }
      }),
      el('div', { cls: 'turn-indicator', id: 'turn-indicator', text: 'TURNO 1' }),
      el('button', {
        cls: 'mid-controls__btn is-cancel', id: 'cancel-btn', text: 'CANCELAR',
        style: { display: 'none' },
        on: { click: () => this.cancelAction() }
      }),
      el('button', {
        cls: 'mid-controls__btn is-danger', text: 'RENDIR',
        on: { click: () => { if (confirm('¿Rendirte?')) this.engine.concede(); } }
      })
    ]);

    const log = el('div', { cls: 'battle-log is-hidden', id: 'battle-log' });

    const gameOverlay = el('div', { cls: 'game-overlay', id: 'game-overlay' }, [
      el('div', { cls: 'ov-t', id: 'ov-title', text: 'VICTORIA' }),
      el('div', { cls: 'ov-s', id: 'ov-subtitle' }),
      el('div', { cls: 'rewards-box', id: 'rewards-box', style: { display: 'none' } }, [
        el('div', { cls: 'rewards-box__title', text: 'RECOMPENSAS' }),
        el('div', { id: 'rewards-list' })
      ]),
      el('button', { cls: 'btn btn--gold', text: 'CONTINUAR', on: { click: () => this.finish() } })
    ]);

    this.rootEl.appendChild(bg);
    this.rootEl.appendChild(arena);
    this.rootEl.appendChild(enemyOrb);
    this.rootEl.appendChild(playerOrb);
    this.rootEl.appendChild(midControls);
    this.rootEl.appendChild(log);
    this.rootEl.appendChild(gameOverlay);
  }

  buildStars() {
    const stars = el('div', { cls: 'battle-bg__stars' });
    for (let i = 0; i < 40; i++) {
      const s = el('div', { cls: 'battle-star' });
      s.style.left = `${Math.random() * 100}%`;
      s.style.top = `${Math.random() * 55}%`;
      s.style.animationDelay = `${Math.random() * 4}s`;
      s.style.opacity = 0.3 + Math.random() * 0.5;
      stars.appendChild(s);
    }
    return stars;
  }

  buildCandles() {
    const container = el('div', { style: { position: 'absolute', inset: 0, pointerEvents: 'none' } });
    const positions = [
      { left: '8%', top: '40%' }, { left: '92%', top: '42%' },
      { left: '20%', top: '72%' }, { left: '80%', top: '72%' },
      { left: '50%', top: '85%' }
    ];
    positions.forEach((pos, i) => {
      const c = el('div', { cls: 'candle-glow' });
      c.style.left = pos.left;
      c.style.top = pos.top;
      c.style.animationDelay = `${i * 0.4}s`;
      container.appendChild(c);
    });
    return container;
  }

  buildSmoke() {
    const container = el('div', { style: { position: 'absolute', inset: 0, pointerEvents: 'none' } });
    const positions = [
      { left: '15%', top: '60%' }, { left: '75%', top: '55%' },
      { left: '40%', top: '70%' }, { left: '85%', top: '65%' }
    ];
    positions.forEach((pos, i) => {
      const s = el('div', { cls: 'smoke' });
      s.style.left = pos.left;
      s.style.top = pos.top;
      s.style.animationDelay = `${i * 3}s`;
      container.appendChild(s);
    });
    return container;
  }

  buildHandArea() {
    return el('div', { cls: 'hand-area' }, [
      el('div', { cls: 'hand-area__power' }, [
        el('button', {
          cls: 'power-btn', id: 'power-btn',
          on: { click: () => this.onPowerClick() }
        }, [
          el('span', { id: 'power-icon', text: '✦' }),
          el('div', { cls: 'power-btn__cost', id: 'power-cost', text: '2' }),
          el('div', { cls: 'power-btn__label', id: 'power-label', text: 'PODER' })
        ])
      ]),
      el('div', { id: 'player-hand', style: { display: 'flex', alignItems: 'flex-end', justifyContent: 'center' } })
    ]);
  }

  // ═════════════ LISTENERS ═════════════

  installListeners() {
    const on = (evt, fn) => this.unsubs.push(bus.on(evt, fn));
    on(EVENTS.LOG, (msg) => this.showLog(msg));
    on(EVENTS.TURN_STARTED, () => this.render());
    on(EVENTS.CARD_DRAWN, ({ player: who }) => {
      this.render();
      if (who === 'enemy') this.animateEnemyDraw();
    });
    on(EVENTS.CARD_PLAYED, () => this.render());
    on(EVENTS.CARD_ENTERED, ({ player: who }) => {
      this.render();
      const last = document.querySelector(
        who === 'player'
          ? '#p-field > .field-card:last-child'
          : '#e-field > .field-card:last-child'
      );
      if (last) {
        last.classList.add('is-entering');
        setTimeout(() => last.classList.remove('is-entering'), 700);
      }
    });
    on(EVENTS.CARD_DIED, () => setTimeout(() => this.render(), 400));
    on(EVENTS.CARD_ATTACKED, () => setTimeout(() => this.render(), 600));
    on(EVENTS.POWER_USED, () => this.render());
    on(EVENTS.SPELL_CAST, () => this.render());
    on(EVENTS.TURN_ENDED, ({ player: who }) => {
      if (who === 'player') this.runEnemyTurn();
    });
    on(EVENTS.GAME_OVER, ({ winner }) => this.handleGameOver(winner));
  }

  uninstallListeners() {
    this.unsubs.forEach(u => u());
    this.unsubs = [];
  }

  // ═════════════ ENEMY TURN ═════════════

  async runEnemyTurn() {
    document.getElementById('turn-btn').disabled = true;
    document.getElementById('turn-btn').classList.add('is-enemy-turn');
    document.getElementById('turn-btn').textContent = 'TURNO RIVAL';
    document.getElementById('cancel-btn').style.display = 'none';
    await this.ai.takeTurn();
    if (!this.engine.state.winner) {
      const btn = document.getElementById('turn-btn');
      btn.disabled = false;
      btn.classList.remove('is-enemy-turn');
      btn.textContent = 'FIN TURNO';
    }
    this.render();
  }

  animateEnemyDraw() {
    setTimeout(() => {
      const cards = document.querySelectorAll('#enemy-hand .card-back');
      const last = cards[cards.length - 1];
      if (last) {
        last.classList.add('is-drawing');
        setTimeout(() => last.classList.remove('is-drawing'), 500);
      }
    }, 50);
  }

  // ═════════════ PLAYER ACTIONS ═════════════

  showLog(msg) {
    const log = document.getElementById('battle-log');
    if (!log) return;
    log.innerHTML = msg;
    log.classList.remove('is-hidden');
    if (this.state.logTimer) clearTimeout(this.state.logTimer);
    this.state.logTimer = setTimeout(() => log.classList.add('is-hidden'), 2800);
  }

  onHandCardTap(card, cardEl) {
    if (this.engine.state.phase !== 'playerTurn') return;

    // If awaiting a spell target, hand taps cancel
    if (this.state.awaitingTarget) {
      this.cancelAction();
      return;
    }

    // Second tap on the same card → play it
    if (this.state.inspectedCardId === card.instanceId) {
      this.closeInspectModal();
      if (!this.engine.canPlayCard('player', card)) {
        this.showLog('No puedes jugar esta carta todavía.');
        audio.play('click');
        return;
      }
      this.attemptPlay(card, cardEl);
      return;
    }

    if (this.state.selectedAttackerId) this.cancelAction();

    // First tap → show full inspect modal with a "JUGAR" button
    this.openInspectModalForHandCard(card, cardEl);
  }

  openInspectModalForHandCard(card, cardEl) {
    this.state.inspectedCardId = card.instanceId;
    this.state.inspectedCardEl = cardEl;
    this.inspectHandler(card);

    // Inject a "JUGAR" button into the modal
    const modal = document.getElementById('inspect-modal');
    const container = modal?.querySelector('.inspect-card');
    if (!container) return;

    const canPlay = this.engine.canPlayCard('player', card);

    // Replace the default "Cerrar" button block with our play/close pair
    const oldActions = container.querySelector('.inspect-card__actions, [data-inspect-actions]');
    if (oldActions) oldActions.remove();
    const lastDiv = container.lastElementChild;
    if (lastDiv && lastDiv.tagName === 'DIV' && lastDiv.querySelector('button')) {
      lastDiv.remove();
    }

    const actions = document.createElement('div');
    actions.setAttribute('data-inspect-actions', 'true');
    actions.style.cssText = 'display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap;';

    const playBtn = document.createElement('button');
    playBtn.className = 'btn btn--gold';
    playBtn.textContent = canPlay ? '⚔ JUGAR' : '✗ FALTAN VELAS';
    playBtn.disabled = !canPlay;
    if (!canPlay) playBtn.style.opacity = '0.4';
    playBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!canPlay) return;
      this.closeInspectModal();
      this.attemptPlay(card, cardEl);
    });

    const closeBtn = document.createElement('button');
    closeBtn.className = 'btn';
    closeBtn.textContent = 'CERRAR';
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      this.closeInspectModal();
    });

    actions.appendChild(playBtn);
    actions.appendChild(closeBtn);
    container.appendChild(actions);

    // Hook onto the modal's backdrop click to clear our state
    const onBackdrop = (e) => {
      if (e.target.id === 'inspect-modal') {
        this.closeInspectModal();
        modal.removeEventListener('click', onBackdrop);
      }
    };
    modal.addEventListener('click', onBackdrop);
    this.state.inspectBackdropHandler = onBackdrop;

    fitInspectCardToViewport();
    audio.play('click');
  }

  closeInspectModal() {
    const modal = document.getElementById('inspect-modal');
    if (modal) {
      modal.classList.remove('is-visible');
      if (this.state.inspectBackdropHandler) {
        modal.removeEventListener('click', this.state.inspectBackdropHandler);
      }
    }
    this.state.inspectedCardId = null;
    this.state.inspectedCardEl = null;
    this.state.inspectBackdropHandler = null;
    resetInspectViewportState();
  }

  attemptPlay(card, cardEl) {
    // Click animation
    cardEl.classList.add('is-clicked');
    setTimeout(() => cardEl.classList.remove('is-clicked'), 350);

    // Does this spell/card need a target?
    const targetingInfo = TARGETING[card.ability];
    if (targetingInfo && card.type !== 'paso') {
      this.state.awaitingTarget = {
        type: 'spell',
        cardInstance: card,
        cardEl,
        targetingInfo
      };
      cardEl.classList.add('is-awaiting-target');
      document.getElementById('cancel-btn').style.display = 'block';
      this.showLog(`Selecciona objetivo para ${card.name}.`);
      this.render();
      audio.play('click');
      return;
    }

    if (targetingInfo && card.type === 'paso') {
      this.state.awaitingTarget = {
        type: 'onEnter',
        cardInstance: card,
        cardEl,
        targetingInfo
      };
      cardEl.classList.add('is-awaiting-target');
      document.getElementById('cancel-btn').style.display = 'block';
      this.showLog(`Selecciona objetivo para habilidad de ${card.name}.`);
      this.render();
      audio.play('click');
      return;
    }

    this.playCardWithAnimation(card, cardEl, null);
  }

  async playCardWithAnimation(card, cardEl, targetInstanceId) {
    // Animate the card flying from hand to field
    const fieldZone = document.getElementById('p-field');
    audio.play('cardPlay');
    await launchCardToField(cardEl, fieldZone);

    // Execute the play in the engine with explicit target
    this.engine.playCard('player', card.instanceId, targetInstanceId);
    this.render();
  }

  onFieldCardTap(card, side) {
    if (this.engine.state.phase !== 'playerTurn') return;

    // If awaiting target, check if this card is valid
    if (this.state.awaitingTarget) {
      const { targetingInfo, cardInstance, cardEl, type } = this.state.awaitingTarget;
      const isValidSide =
        (targetingInfo.side === 'ally' && side === 'player') ||
        (targetingInfo.side === 'enemy' && side === 'enemy');

      if (isValidSide && (targetingInfo.kind === 'paso' || targetingInfo.kind === 'any')) {
        this.confirmTarget(card.instanceId);
        return;
      }
      this.showLog('Objetivo no válido.');
      audio.play('click');
      return;
    }

    // Normal flow: attacker selection / attack
    if (side === 'player') {
      const sel = this.state.selectedAttackerId;
      if (sel === card.instanceId) {
        // Tap twice: try face attack
        this.doAttack(null);
        return;
      }
      if (this.engine.canAttack(card)) {
        this.state.selectedAttackerId = card.instanceId;
        document.getElementById('cancel-btn').style.display = 'block';
        this.showLog(`${card.name} listo para atacar.`);
        audio.play('click');
        this.render();
      } else {
        this.showLog(card.sleeping ? 'En encierro este turno.' : 'Ya atacó.');
        audio.play('click');
      }
    } else {
      // Enemy card
      if (this.state.selectedAttackerId) {
        this.doAttack(card.instanceId);
      } else {
        this.inspectHandler(card);
      }
    }
  }

  confirmTarget(targetInstanceId) {
    const { type, cardInstance, cardEl } = this.state.awaitingTarget;
    cardEl?.classList.remove('is-awaiting-target');
    document.getElementById('cancel-btn').style.display = 'none';
    const saved = { ...this.state.awaitingTarget };
    this.state.awaitingTarget = null;

    if (type === 'spell' || type === 'onEnter') {
      this.playCardWithAnimation(cardInstance, cardEl, targetInstanceId);
    } else if (type === 'power') {
      this.engine.usePower('player', targetInstanceId);
      audio.play('power');
      this.render();
    }
  }

  doAttack(targetId) {
    const atkId = this.state.selectedAttackerId;
    if (!atkId) return;
    const ok = this.engine.attack('player', atkId, targetId);
    if (!ok) {
      this.showLog('¡Hay un Palio rival! Debes atacarlo primero.');
      audio.play('click');
      return;
    }
    this.state.selectedAttackerId = null;
    document.getElementById('cancel-btn').style.display = 'none';
    this.render();
  }

  cancelAction() {
    if (this.state.inspectedCardId) this.closeInspectModal();
    if (this.state.awaitingTarget) {
      this.state.awaitingTarget.cardEl?.classList.remove('is-awaiting-target');
      this.state.awaitingTarget = null;
    }
    this.state.selectedAttackerId = null;
    document.getElementById('cancel-btn').style.display = 'none';
    audio.play('click');
    this.render();
  }

  onEndTurnClick() {
    if (this.engine.state.phase !== 'playerTurn') return;
    if (this.state.inspectedCardId) this.closeInspectModal();
    audio.play('click');
    this.cancelAction();
    this.engine.endTurn();
  }

  onPowerClick() {
    if (this.engine.state.phase !== 'playerTurn') return;
    if (!this.engine.canUsePower('player')) {
      this.showLog('No se puede usar el poder ahora.');
      audio.play('click');
      return;
    }
    const pw = this.engine.state.player.hermandad.power;
    const targetingInfo = TARGETING[pw.effect];

    if (targetingInfo) {
      // Needs a target
      this.cancelAction();
      this.state.awaitingTarget = {
        type: 'power',
        cardInstance: null,
        cardEl: document.getElementById('power-btn'),
        targetingInfo
      };
      document.getElementById('cancel-btn').style.display = 'block';
      this.showLog(`Selecciona objetivo para ${pw.name}.`);
      audio.play('click');
      this.render();
    } else {
      // No target — use directly
      this.engine.usePower('player');
      audio.play('power');
      this.render();
    }
  }

  // ═════════════ RENDER ═════════════

  render() {
    if (!this.engine) return;
    // Rendering rebuilds the hand. Close any open inspect modal cleanly
    // so we don't leak a stale DOM reference to a card that's being rebuilt.
    if (this.state.inspectedCardId) this.closeInspectModal();
    const s = this.engine.state;
    const p = s.player, e = s.enemy;

    // HP and stats
    document.getElementById('p-hp').textContent = Math.max(0, p.hp);
    document.getElementById('e-hp').textContent = Math.max(0, e.hp);
    document.querySelector('.hp-orb--player .hp-orb__hp-max').textContent = `/${p.maxHp}`;
    document.querySelector('.hp-orb--enemy .hp-orb__hp-max').textContent = `/${e.maxHp}`;
    document.getElementById('p-name').textContent = p.hermandad.name.toUpperCase();
    document.getElementById('e-name').textContent = e.hermandad.name.toUpperCase();
    document.getElementById('p-avi').textContent = p.hermandad.symbol;
    document.getElementById('e-avi').textContent = e.hermandad.symbol;
    document.getElementById('p-deck').textContent = p.deck.length;
    document.getElementById('e-deck').textContent = e.deck.length;
    document.getElementById('p-hand-count').textContent = p.hand.length;
    document.getElementById('e-hand-count').textContent = e.hand.length;

    this.renderMana('p-mana', p.mana, p.maxMana);
    this.renderMana('e-mana', e.mana, e.maxMana);

    // Turn indicator
    document.getElementById('turn-indicator').textContent = `TURNO ${s.turn}`;

    // Power button
    const canPower = this.engine.canUsePower('player') && s.phase === 'playerTurn';
    const pb = document.getElementById('power-btn');
    pb.classList.toggle('is-ready', canPower);
    pb.disabled = !canPower;
    document.getElementById('power-cost').textContent = p.hermandad.power.cost;
    document.getElementById('power-label').textContent = p.hermandad.power.name.toUpperCase();

    // Fields
    this.renderField('e-field', e.field, 'enemy');
    this.renderField('p-field', p.field, 'player');

    // Attack hero target (when attacker selected & no taunt rival)
    if (this.state.selectedAttackerId && s.phase === 'playerTurn') {
      const hasTaunt = this.engine.hasTaunt(e.field);
      if (!hasTaunt) {
        const faceTarget = el('div', {
          cls: 'attack-hero-target',
          on: { click: () => this.doAttack(null) }
        }, [
          el('div', { cls: 'attack-hero-target__text', html: '⚔<br>ATACAR<br>HÉROE' })
        ]);
        document.getElementById('e-field').appendChild(faceTarget);
      }
    }

    // Enemy hand (face-down)
    this.renderEnemyHand(e.hand.length);

    // Player hand
    this.renderPlayerHand(p.hand, s.phase === 'playerTurn');
  }

  renderMana(id, current, max) {
    const c = document.getElementById(id);
    if (!c) return;
    clear(c);
    const total = Math.max(max, 1);
    for (let i = 0; i < total; i++) {
      c.appendChild(el('div', { cls: ['mana-bead', i < current ? 'is-lit' : 'is-spent'] }));
    }
  }

  renderField(containerId, fieldArr, side) {
    const node = document.getElementById(containerId);
    clear(node);
    if (fieldArr.length === 0) {
      const txt = side === 'player' ? 'Tu campo · juega un paso' : 'Campo rival vacío';
      node.appendChild(el('div', { cls: 'field-zone__empty', text: txt }));
      return;
    }

    // Check targeting highlighting
    const awaiting = this.state.awaitingTarget;
    const validSide = awaiting ? (awaiting.targetingInfo.side === 'ally' ? 'player' : 'enemy') : null;

    for (const c of fieldArr) {
      const ab = getAbility(c.ability);
      const isTaunt = ab?.isTaunt && !c.silenced;
      const isDivine = c.ability === 'divine' && !c.silenced && !c.hasBeenHit;
      const selected = side === 'player' && this.state.selectedAttackerId === c.instanceId;
      const isValidTarget = awaiting && side === validSide;
      const isBuffTarget = isValidTarget && awaiting.targetingInfo.side === 'ally';

      const cardEl = renderFieldCard(c, side, {
        selected, isTaunt, isDivine,
        onTap: () => this.onFieldCardTap(c, side),
        onLongPress: () => this.inspectHandler(c)
      });

      if (isValidTarget) {
        if (isBuffTarget) cardEl.classList.add('is-buff-target');
        else cardEl.classList.add('is-valid-target');
      }

      node.appendChild(cardEl);
    }
  }

  renderEnemyHand(count) {
    const hand = document.getElementById('enemy-hand');
    clear(hand);
    for (let i = 0; i < count; i++) {
      hand.appendChild(el('div', { cls: 'card-back' }));
    }
  }

  renderPlayerHand(handArr, isPlayerTurn) {
    const hand = document.getElementById('player-hand');
    clear(hand);
    if (handArr.length === 0) {
      hand.classList.remove('is-compact');
      hand.appendChild(el('div', { style: { color: 'var(--c-purple-dark)', fontSize: '11px', fontStyle: 'italic', letterSpacing: '3px' }, text: 'MANO VACÍA' }));
      return;
    }
    for (const c of handArr) {
      const playable = this.engine.canPlayCard('player', c) && isPlayerTurn;
      // Use closure cell to let onTap find cardEl after it's assigned
      const ref = { el: null };
      ref.el = renderHandCard(c, {
        playable,
        onTap: () => this.onHandCardTap(c, ref.el),
        onLongPress: () => this.inspectHandler(c)
      });
      hand.appendChild(ref.el);
    }
    this.layoutCompactPlayerHand();
  }

  layoutCompactPlayerHand() {
    const hand = document.getElementById('player-hand');
    if (!hand) return;

    const cards = [...hand.querySelectorAll('.hand-card')];
    const compact = isCompactBattleMobileViewport() && cards.length > 0;
    hand.classList.toggle('is-compact', compact);

    cards.forEach((card) => {
      card.style.removeProperty('--compact-hand-rot');
      card.style.removeProperty('--compact-hand-lift');
      card.style.removeProperty('z-index');
    });

    if (!compact) return;

    const count = cards.length;
    cards.forEach((card, index) => {
      const ratio = count === 1 ? 0 : (index / (count - 1)) * 2 - 1;
      const rotate = ratio * 6;
      const lift = -Math.round((1 - Math.abs(ratio)) * 6);
      card.style.setProperty('--compact-hand-rot', `${rotate.toFixed(2)}deg`);
      card.style.setProperty('--compact-hand-lift', `${lift}px`);
      card.style.zIndex = String(10 + index);
    });
  }

  // ═════════════ GAME OVER ═════════════

  handleGameOver(winner) {
    const isWin = winner === 'player';
    const titleEl = document.getElementById('ov-title');
    titleEl.textContent = isWin ? '¡VICTORIA!' : 'DERROTA';
    titleEl.style.color = isWin ? 'var(--c-gold)' : 'var(--c-red)';
    titleEl.style.fontSize = '54px';
    titleEl.style.letterSpacing = '5px';
    titleEl.style.fontWeight = '700';
    titleEl.style.textShadow = isWin
      ? '0 0 30px rgba(232,197,71,0.7)'
      : '0 0 30px rgba(153,53,86,0.7)';
    titleEl.style.marginBottom = '12px';

    const subEl = document.getElementById('ov-subtitle');
    subEl.textContent = isWin
      ? 'Las calles de Sevilla te aclaman. El palio es tuyo.'
      : 'El fervor no fue suficiente. La Semana Santa aún espera.';
    subEl.style.color = 'var(--c-text-dim)';
    subEl.style.fontSize = '14px';
    subEl.style.marginBottom = '20px';
    subEl.style.maxWidth = '400px';
    subEl.style.fontStyle = 'italic';

    // Apply rewards
    const rewards = { dublones: 0, gemas: 0, pack: null, levelUp: false, newCampaign: false };
    if (isWin) {
      if (this.engine.state.isCampaign && this.engine.state.campaignDayId !== null) {
        const d = CAMPAIGN[this.engine.state.campaignDayId];
        if (this.engine.state.campaignDayId === player.state.campaignProgress) {
          player.advanceCampaign();
          rewards.newCampaign = true;
        }
        rewards.dublones += d.reward.dublones || 0;
        rewards.gemas += d.reward.gemas || 0;
        rewards.pack = d.reward.pack || null;
      } else {
        rewards.dublones += 50;
        if (Math.random() < 0.2) rewards.gemas += 1;
      }
      const levelBefore = player.state.level;
      player.recordWin();
      rewards.levelUp = player.state.level > levelBefore;
    } else {
      rewards.dublones += 10;
      player.recordLoss();
    }
    player.addCurrency({ dublones: rewards.dublones, gemas: rewards.gemas });
    if (rewards.pack) player.update(s => { s.pendingRewardPack = rewards.pack; });

    const list = document.getElementById('rewards-list');
    clear(list);
    const addRow = (label, value) => list.appendChild(el('div', {
      style: { display: 'flex', justifyContent: 'space-between', fontSize: '13px', padding: '4px 0', color: 'var(--c-text)' }
    }, [el('span', { text: label }), el('b', { html: value, style: { color: 'var(--c-gold)' } })]));
    if (rewards.dublones) addRow('Monedas', `+${rewards.dublones} 💰`);
    if (rewards.gemas) addRow('Gemas', `+${rewards.gemas} 💎`);
    if (rewards.pack) addRow('Sobre', rewards.pack.toUpperCase());
    if (rewards.levelUp) addRow('Nivel', `↑ ${player.state.level}`);
    if (rewards.newCampaign) addRow('Nuevo día', 'DESBLOQUEADO');

    const box = document.getElementById('rewards-box');
    box.style.display = 'block';
    box.style.background = 'var(--c-bg-2)';
    box.style.border = '1px solid var(--c-gold)';
    box.style.borderRadius = '8px';
    box.style.padding = '14px 20px';
    box.style.marginBottom = '18px';
    box.style.minWidth = '280px';
    const boxTitle = box.querySelector('.rewards-box__title');
    boxTitle.style.fontSize = '10px';
    boxTitle.style.color = 'var(--c-gold)';
    boxTitle.style.letterSpacing = '3px';
    boxTitle.style.marginBottom = '10px';

    setTimeout(() => document.getElementById('game-overlay').classList.add('is-visible'), 600);
  }

  finish() {
    document.getElementById('game-overlay').classList.remove('is-visible');
    this.uninstallListeners();
    this.onFinish({ isCampaign: this.engine?.state.isCampaign });
  }
}

/**
 * SCREENS
 * Renders non-battle pages: Home, Campaign, Quickplay, Collection, Packs, Deckbuilder.
 * All share the same page-hud/page-body layout.
 */












const STORE = {
  collFilter: 'all',
  activeCampaignDay: null,
  toastTimer: null,
  inspectOpen: false
};

const RARITY_LABEL = { L: 'LEGENDARIA', E: 'EPICA', R: 'RARA', C: 'COMUN' };

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('is-active'));
  document.getElementById(id)?.classList.add('is-active');
  audio.play('click');
  // All non-battle screens share the intro track
  if (id !== 'battle') music.play('intro');
  const renderers = { home: renderHome, campaign: renderCampaign, quickplay: renderQuickplay, collection: renderCollection, packs: renderPacks, deckbuilder: renderDeckbuilder };
  renderers[id]?.();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('is-visible');
  if (STORE.toastTimer) clearTimeout(STORE.toastTimer);
  STORE.toastTimer = setTimeout(() => t.classList.remove('is-visible'), 2000);
}

// HOME
// ═══════════════════════════════════════════════════════════════

    ]),

// ═══════════════════════════════════════════════════════════════
// CAMPAIGN
// ═══════════════════════════════════════════════════════════════
function buildCampaign() {
  return el('div', { id: 'campaign', cls: 'screen page' }, [
    pageHud('CAMPAÑA · LA SEMANA SANTA'),
    el('div', { cls: 'page__body' }, [el('div', { cls: 'campaign-grid', id: 'campaign-grid' })])
  ]);
}

function renderCampaign() {
  const grid = document.getElementById('campaign-grid');
  clear(grid);
  const progress = player.state.campaignProgress;
  CAMPAIGN.forEach((day, i) => {
    const available = i <= progress;
    const done = i < progress;
    const rewardParts = [];
    if (day.reward.dublones) rewardParts.push(`${day.reward.dublones} 💰`);
    if (day.reward.gemas) rewardParts.push(`${day.reward.gemas} 💎`);
    if (day.reward.pack) rewardParts.push(`Sobre ${day.reward.pack}`);

    const statusCls = done ? 'is-done' : available ? 'is-available' : 'is-locked';
    const statusLabel = done ? '✓' : available ? 'JUGAR' : '🔒';
    const statusSub = done ? 'done' : available ? 'play' : 'locked';

    const card = el('div', { cls: ['campaign-day', statusCls] }, [
      el('div', { cls: ['campaign-day__status', `campaign-day__status--${statusSub}`], text: statusLabel }),
      el('div', { cls: 'campaign-day__num', text: String(i + 1) }),
      el('div', { cls: 'campaign-day__name', text: day.name.toUpperCase() }),
      el('div', { cls: 'campaign-day__opponent', text: `vs ${day.opponent}` }),
      el('div', { cls: 'campaign-day__reward', html: rewardParts.join('<br>') })
    ]);
    if (available) card.addEventListener('click', () => {
      STORE.activeCampaignDay = i;
      showScreen('quickplay');
      audio.play('click');
    });
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════════
// QUICKPLAY (hermandad selection)
// ═══════════════════════════════════════════════════════════════
function buildQuickplay() {
  return el('div', { id: 'quickplay', cls: 'screen page' }, [
    pageHud('ELIGE HERMANDAD', 'quickplay-title'),
    el('div', { cls: 'page__body' }, [
      el('div', { id: 'quickplay-info' }),
      el('div', { cls: 'hermandad-grid', id: 'hermandad-grid' })
    ])
  ]);
}

function renderQuickplay() {
  const info = document.getElementById('quickplay-info');
  clear(info);
  const dayIdx = STORE.activeCampaignDay;
  if (dayIdx !== null && CAMPAIGN[dayIdx]) {
    const d = CAMPAIGN[dayIdx];
    info.appendChild(el('div', { cls: 'quickplay-info' }, [
      el('div', { text: `DÍA ${dayIdx + 1} · ${d.name.toUpperCase()}`, style: { fontSize: '11px', color: 'var(--c-gold)', letterSpacing: '3px' } }),
      el('div', { text: `vs ${d.opponent}`, style: { fontSize: '11px', color: 'var(--c-text-dim)', marginTop: '5px' } })
    ]));
    document.getElementById('quickplay-title').textContent = 'CAMPAÑA · ELIGE HERMANDAD';
  } else {
    document.getElementById('quickplay-title').textContent = 'PARTIDA RÁPIDA · ELIGE HERMANDAD';
  }

  const grid = document.getElementById('hermandad-grid');
  clear(grid);
  HERMANDADES.forEach(h => {
    const isStarter = STARTER_HERMANDAD_IDS.includes(h.id);
    if (!isStarter) return; // hide non-starters for now
    const statsHtml = `<b>${h.power.name}</b> (${h.power.cost})<br>${h.power.description}`;
    const barrioHtml = h.barrio ? `<div style="font-size:8px;color:var(--c-text-muted);margin-top:2px;">${h.barrio}</div>` : '';
    const card = el('div', { cls: 'hermandad-card', on: { click: () => launchBattle(h.id) } }, [
      el('div', { cls: 'hermandad-card__symbol', text: h.symbol }),
      el('div', { cls: 'hermandad-card__name', text: h.name }),
      el('div', { cls: 'hermandad-card__day', text: h.day }),
      el('div', { cls: 'hermandad-card__power', html: statsHtml }),
      el('div', { cls: 'hermandad-card__style', html: barrioHtml || '' })
    ]);
    grid.appendChild(card);
  });

  // Add a "locked" placeholder indicating more hermandades coming
  const lockedCount = HERMANDADES.length - STARTER_HERMANDAD_IDS.length;
  if (lockedCount > 0) {
    const locked = el('div', {
      cls: 'hermandad-card',
      style: { opacity: '0.4', cursor: 'default', borderStyle: 'dashed' }
    }, [
      el('div', { cls: 'hermandad-card__symbol', text: '🔒' }),
      el('div', { cls: 'hermandad-card__name', text: `+${lockedCount} MÁS` }),
      el('div', { cls: 'hermandad-card__day', text: 'DESBLOQUEAR' }),
      el('div', { cls: 'hermandad-card__power', html: 'Completa la campaña y abre sobres para descubrir el resto de hermandades de Sevilla.' })
    ]);
    grid.appendChild(locked);
  }
}

function launchBattle(hermandadId) {
  const isCamp = STORE.activeCampaignDay !== null;
  const playerDeck = player.isDeckValid(hermandadId) ? player.getDeck(hermandadId) : HERMANDADES.find(h => h.id === hermandadId).defaultDeck;
  let enemyHermandadId, enemyDeck, scene = 'noche';
  if (isCamp) {
    const d = CAMPAIGN[STORE.activeCampaignDay];
    enemyHermandadId = 'campaign_opponent';
    enemyDeck = [...d.deck];
    scene = d.scene;
  } else {
    let enemy = randomChoice(HERMANDADES);
    if (enemy.id === hermandadId) enemy = HERMANDADES[(HERMANDADES.indexOf(enemy) + 1) % HERMANDADES.length];
    enemyHermandadId = enemy.id;
    enemyDeck = [...enemy.defaultDeck];
    scene = randomChoice(['noche', 'amanecer', 'capilla']);
  }

  const opponentName = isCamp ? CAMPAIGN[STORE.activeCampaignDay].opponent : HERMANDADES.find(h => h.id === enemyHermandadId).name;
  const overrideEnemy = isCamp ? { id: 'campaign_opponent', name: opponentName, symbol: '✞', bonusHp: 0, power: { name: 'Majestad', cost: 2, effect: 'power_majestad' } } : null;

  window.__startBattle({
    playerHermandadId: hermandadId,
    playerDeck,
    enemyHermandadId: isCamp ? null : enemyHermandadId,
    enemyHermandadOverride: overrideEnemy,
    enemyDeck,
    isCampaign: isCamp,
    campaignDayId: STORE.activeCampaignDay,
    scene
  });
}

// ═══════════════════════════════════════════════════════════════
// COLLECTION
// ═══════════════════════════════════════════════════════════════
function buildCollection() {
  return el('div', { id: 'collection', cls: 'screen page' }, [
    el('div', { cls: 'page__hud' }, [
      el('div', { cls: 'page__title' }, ['COLECCIÓN · ', el('span', { id: 'coll-hud', style: { color: 'var(--c-text-dim)', fontSize: '11px', fontWeight: 400, letterSpacing: '1px' }, text: '' })]),
      el('button', { cls: 'btn btn--sm', text: 'INICIO', on: { click: () => showScreen('home') } })
    ]),
    el('div', { cls: 'page__body' }, [
      el('div', { cls: 'collection-filters', id: 'collection-filters' },
        ['all', 'owned', 'L', 'E', 'R', 'C', 'Paso', 'Marcha'].map(f =>
          el('div', {
            cls: ['filter-chip', f === 'all' && 'is-active'],
            attrs: { 'data-filter': f },
            text: filterLabel(f),
            on: { click: () => { STORE.collFilter = f; renderCollection(); } }
          })
        )
      ),
      el('div', { cls: 'collection-grid', id: 'collection-grid' })
    ])
  ]);
}

function filterLabel(f) {
  return { all: 'TODAS', owned: 'MIAS', L: 'LEGENDARIAS', E: 'EPICAS', R: 'RARAS', C: 'COMUNES', Paso: 'PASOS', Marcha: 'MARCHAS' }[f];
}

function renderCollection() {
  const total = Object.keys(CARDS).length;
  const owned = player.getTotalCardsOwned();
  document.getElementById('coll-hud').textContent = `${owned}/${total} cartas`;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('is-active', c.getAttribute('data-filter') === STORE.collFilter);
  });

  const grid = document.getElementById('collection-grid');
  clear(grid);
  for (const id of Object.keys(CARDS)) {
    const c = CARDS[id];
    const qty = player.getOwnedCount(id);
    const hasIt = qty > 0;
    let show = true;
    const f = STORE.collFilter;
    if (f === 'owned') show = hasIt;
    else if (['L', 'E', 'R', 'C'].includes(f)) show = c.rarity === f;
    else if (f === 'Paso') show = c.type === 'paso';
    else if (f === 'Marcha') show = c.type === 'marcha' || c.type === 'suceso';
    if (!show) continue;
    grid.appendChild(renderCollectionCard(id, { owned: hasIt, qty, onTap: (card, q) => openInspect(card, q) }));
  }
}

// ═══════════════════════════════════════════════════════════════
// PACKS
// ═══════════════════════════════════════════════════════════════
function buildPacks() {
  return el('div', { id: 'packs', cls: 'screen page' }, [
    el('div', { cls: 'page__hud' }, [
      el('div', { cls: 'page__title', text: 'TIENDA DE SOBRES' }),
      el('button', {
        cls: 'btn btn--sm', id: 'daily-btn', text: 'DIARIA +50 💰',
        on: { click: () => tryClaimDaily() }
      }),
      el('button', { cls: 'btn btn--sm', text: 'INICIO', on: { click: () => showScreen('home') } })
    ]),
    el('div', { cls: 'page__body packs-grid' }, Object.values(PACKS).map(pack =>
      el('div', {
        cls: ['pack-card', pack.tier === 'premium' && 'pack-card--premium', pack.tier === 'legendary' && 'pack-card--legendary'],
        on: { click: () => buyPack(pack.id) }
      }, [
        el('div', { cls: 'pack-card__art', text: pack.art }),
        el('div', { cls: 'pack-card__name', text: pack.name.toUpperCase() }),
        el('div', { cls: 'pack-card__desc', text: pack.description }),
        el('div', { cls: 'pack-card__price', text: pack.cost.dublones ? `${pack.cost.dublones} 💰` : `${pack.cost.gemas} 💎` }),
        el('div', { cls: 'pack-card__rate', text: formatRates(pack.rates) })
      ])
    ))
  ]);
}

function formatRates(rates) {
  return Object.entries(rates).map(([k, v]) => `${Math.round(v * 100)}% ${k}`).join(' · ');
}

function renderPacks() {
  document.getElementById('daily-btn').disabled = !player.canClaimDaily();
}

function tryClaimDaily() {
  if (!player.claimDaily()) {
    toast('Ya reclamada hoy');
    return;
  }
  audio.play('heal');
  toast('+50 monedas diarias');
  renderPacks();
  renderHome();
}

function buyPack(packId) {
  const pack = PACKS[packId];
  if (!player.spendCurrency(pack.cost)) {
    toast('Faltan recursos');
    return;
  }
  audio.play('pack');
  openPackReveal(pack);
  renderHome();
}

function openPackReveal(pack) {
  const cards = [];
  for (let i = 0; i < pack.size; i++) {
    let rarity;
    if (i === pack.size - 1) rarity = pack.guaranteed;
    else rarity = weightedChoice(pack.rates);
    const pool = CARDS_BY_RARITY[rarity] || CARDS_BY_RARITY.C;
    cards.push(randomChoice(pool));
  }

  const modal = document.getElementById('opening-overlay');
  modal.classList.add('is-visible');
  document.getElementById('opening-title').textContent = 'ABRIENDO SOBRE...';
  document.getElementById('opening-close').style.display = 'none';
  const row = document.getElementById('opening-reveal');
  clear(row);

  const wasNew = cards.map(id => player.getOwnedCount(id) === 0);
  cards.forEach(id => player.addCard(id));

  cards.forEach((id, idx) => {
    const node = renderRevealCard(id, { isNew: wasNew[idx] });
    row.appendChild(node);
  });

  let i = 0;
  const reveal = () => {
    const nodes = row.children;
    if (i >= nodes.length) {
      document.getElementById('opening-close').style.display = 'block';
      document.getElementById('opening-title').textContent = 'CARTAS OBTENIDAS';
      return;
    }
    nodes[i].classList.add('is-shown');
    const rarity = CARDS[cards[i]].rarity;
    audio.play(rarity === 'L' ? 'legendary' : rarity === 'E' ? 'reveal' : 'click');
    i++;
    setTimeout(reveal, 500);
  };
  setTimeout(reveal, 300);

  player.update(s => { s.stats.packsOpened++; });
}

// ═══════════════════════════════════════════════════════════════
// DECKBUILDER
// ═══════════════════════════════════════════════════════════════
function buildDeckbuilder() {
  return el('div', { id: 'deckbuilder', cls: 'screen page' }, [
    pageHud('EDITOR DE MAZOS'),
    el('div', { cls: 'page__body' }, [el('div', { cls: 'deckbuilder-grid', id: 'deckbuilder-grid' })])
  ]);
}

function renderDeckbuilder() {
  const root = document.getElementById('deckbuilder-grid');
  clear(root);
  HERMANDADES.forEach(h => {
    const deck = player.getDeck(h.id);
    const valid = player.isDeckValid(h.id);
    const errs = [];
    if (deck.length !== 14) errs.push(`${14 - deck.length} cartas faltan`);
    const counts = {};
    deck.forEach(id => counts[id] = (counts[id] || 0) + 1);
    for (const [cid, n] of Object.entries(counts)) {
      const max = CARDS[cid].rarity === 'L' ? 1 : 2;
      if (n > max) errs.push(`${CARDS[cid].name} excede`);
    }

    const editor = el('div', { cls: 'deck-editor' }, [
      el('div', { cls: 'deck-editor__header' }, [
        el('div', {}, [
          el('div', { cls: 'deck-editor__title', text: `${h.symbol} ${h.name.toUpperCase()}` }),
          el('div', { cls: 'deck-editor__subtitle', text: h.style })
        ]),
        el('div', { cls: ['deck-editor__count', valid ? 'is-valid' : errs.length ? 'is-invalid' : ''], text: `${deck.length}/14 ${valid ? '✓' : ''}` })
      ]),
      el('div', { cls: 'deck-editor__list' }, deck.map(cid => {
        const cd = CARDS[cid];
        return el('span', { cls: 'deck-chip', text: `${cd.cost} ${cd.name}`, on: { click: () => { removeFromDeck(h.id, cid); } } });
      })),
      errs.length ? el('div', { style: { fontSize: '9px', color: 'var(--c-danger)', marginTop: '6px' }, text: errs.join(' · ') }) : null,
      el('div', { style: { marginTop: '10px' } }, [
        el('button', { cls: 'btn btn--sm', text: 'AÑADIR', on: { click: () => togglePanel(h.id) } }),
        el('button', { cls: 'btn btn--sm', text: 'RESET', on: { click: () => resetDeckToDefault(h.id) } })
      ]),
      el('div', { cls: 'deck-editor__add-panel', id: `add-panel-${h.id}` })
    ]);
    root.appendChild(editor);
  });
}

function togglePanel(hermId) {
  const panel = document.getElementById(`add-panel-${hermId}`);
  if (panel.classList.contains('is-visible')) {
    panel.classList.remove('is-visible');
    return;
  }
  panel.classList.add('is-visible');
  const deck = player.getDeck(hermId);
  const counts = {};
  deck.forEach(id => counts[id] = (counts[id] || 0) + 1);
  clear(panel);
  panel.appendChild(el('div', { style: { fontSize: '10px', color: 'var(--c-text-muted)', marginBottom: '6px', letterSpacing: '2px' }, text: 'TU COLECCIÓN' }));
  const list = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '4px' } });
  Object.keys(CARDS).forEach(cid => {
    const qty = player.getOwnedCount(cid);
    if (qty <= 0) return;
    const inc = counts[cid] || 0;
    const max = CARDS[cid].rarity === 'L' ? 1 : 2;
    const disabled = inc >= max || inc >= qty || deck.length >= 14;
    const color = { L: '#e8c547', E: '#6B4FA0', R: '#378ADD', C: '#3a3060' }[CARDS[cid].rarity];
    list.appendChild(el('span', {
      cls: ['deck-chip', 'deck-chip--add', disabled && 'is-disabled'],
      text: `${CARDS[cid].cost} ${CARDS[cid].name} ${inc}/${max}`,
      style: { borderColor: color },
      attrs: { title: CARDS[cid].abilityText || '' },
      on: disabled ? {} : { click: () => { addToDeck(hermId, cid); } }
    }));
  });
  panel.appendChild(list);
}

function addToDeck(hermId, cardId) {
  const deck = player.getDeck(hermId);
  if (deck.length >= 14) { toast('Mazo lleno'); return; }
  const counts = {};
  deck.forEach(id => counts[id] = (counts[id] || 0) + 1);
  const inc = counts[cardId] || 0;
  const max = CARDS[cardId].rarity === 'L' ? 1 : 2;
  if (inc >= max) { toast('Límite alcanzado'); return; }
  if (inc >= player.getOwnedCount(cardId)) { toast('Sin más copias'); return; }
  player.setDeck(hermId, [...deck, cardId]);
  audio.play('click');
  renderDeckbuilder();
  togglePanel(hermId);
  togglePanel(hermId);
}

function removeFromDeck(hermId, cardId) {
  const deck = [...player.getDeck(hermId)];
  const idx = deck.indexOf(cardId);
  if (idx >= 0) {
    deck.splice(idx, 1);
    player.setDeck(hermId, deck);
    audio.play('click');
    renderDeckbuilder();
  }
}

function resetDeckToDefault(hermId) {
  const herm = HERMANDADES.find(h => h.id === hermId);
  player.setDeck(hermId, [...herm.defaultDeck]);
  renderDeckbuilder();
  toast('Mazo reseteado');
}

// INSPECT MODAL

function buildInspectModal() {
  return el('div', {
    id: 'inspect-modal', cls: 'inspect-modal',
    on: { click: (e) => { if (e.target.id === 'inspect-modal') closeInspect(); } }
  }, [el('div', { id: 'inspect-container' })]);
}

function isCompactBattleMobileViewport() {
  const vv = window.visualViewport;
  const width = vv?.width || window.innerWidth;
  const height = vv?.height || window.innerHeight;
  const mobile = typeof isMobile === 'boolean'
    ? isMobile
    : /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  return mobile && width > height && height <= 540;
}

function resetInspectViewportState() {
  const modal = document.getElementById('inspect-modal');
  const card = modal?.querySelector('.inspect-card');
  modal?.classList.remove('is-compact');
  card?.style.removeProperty('--inspect-scale');
}

function fitInspectCardToViewport() {
  const modal = document.getElementById('inspect-modal');
  const card = modal?.querySelector('.inspect-card');
  if (!modal || !card || !modal.classList.contains('is-visible')) return;

  resetInspectViewportState();
  if (!isCompactBattleMobileViewport()) return;

  modal.classList.add('is-compact');
  requestAnimationFrame(() => {
    if (!modal.classList.contains('is-visible')) return;
    const vv = window.visualViewport;
    const width = vv?.width || window.innerWidth;
    const height = vv?.height || window.innerHeight;
    const safeW = Math.max(width - 20, 180);
    const safeH = Math.max(height - 20, 220);
    const cardW = card.offsetWidth || 250;
    const cardH = card.scrollHeight || card.offsetHeight || 420;
    const scale = Math.min(safeW / cardW, safeH / cardH, 1);
    card.style.setProperty('--inspect-scale', scale.toFixed(3));
  });
}

function openInspect(card, ownedQty) {
  const modal = document.getElementById('inspect-modal');
  const container = document.getElementById('inspect-container');
  clear(container);
  container.appendChild(renderInspectCard(card, ownedQty));
  modal.classList.add('is-visible');
  fitInspectCardToViewport();
  audio.play('click');
}

function closeInspect() {
  document.getElementById('inspect-modal').classList.remove('is-visible');
  resetInspectViewportState();
}

window.addEventListener('resize', fitInspectCardToViewport);
window.addEventListener('orientationchange', fitInspectCardToViewport);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fitInspectCardToViewport);
}

let musicBootstrapped = false;
function hasActiveFullscreen(doc = document) {
  return Boolean(doc.fullscreenElement || doc.webkitFullscreenElement);
}

function shouldQueueInitialFullscreen(mobile = isMobile, doc = document) {
  return mobile && !hasActiveFullscreen(doc);
}

// ═══════════════════════════════════════════════════════════════
// FULLSCREEN ON LANDSCAPE
//
// Browsers hide the URL bar when an app enters fullscreen. We can only
// request fullscreen from a user gesture, so we arm a "pending" flag
// whenever the viewport rotates to landscape, and consume it on the
// very next tap/click. Also try immediately after rotation in case the
// browser still considers the orientation event a user gesture
// (works on Chrome Android, usually not on iOS Safari).
// ═══════════════════════════════════════════════════════════════
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
const isLandscape = () =>
  (window.matchMedia && window.matchMedia('(orientation: landscape)').matches) ||
  window.innerWidth > window.innerHeight;

let pendingFullscreen = shouldQueueInitialFullscreen();

function requestFullscreenSafe() {
  if (!isMobile) {
    pendingFullscreen = false;
    return false;
  }
  if (hasActiveFullscreen()) {
    pendingFullscreen = false;
    return false;
  }
  const root = document.documentElement;
  const fn = root.requestFullscreen || root.webkitRequestFullscreen || root.webkitEnterFullscreen;
  if (!fn) {
    pendingFullscreen = false;
    return false;
  }
  try {
    const promise = fn.call(root);
    if (promise && typeof promise.then === 'function') {
      promise
        .then(() => { pendingFullscreen = false; })
        .catch(() => { pendingFullscreen = !hasActiveFullscreen(); });
    } else {
      pendingFullscreen = !hasActiveFullscreen();
    }
    // Lock to landscape on devices that support the API
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
    return true;
  } catch (e) {
    pendingFullscreen = !hasActiveFullscreen();
    return false;
  }
}

function onOrientationMaybeChanged() {
  if (!isMobile) return;
  if (isLandscape()) {
    // Try immediately (sometimes works as the rotation itself is a gesture)
    requestFullscreenSafe();
    // If that failed, consume the next user tap to force it
    pendingFullscreen = true;
  } else {
    // Back to portrait — exit fullscreen so the rotate overlay shows cleanly
    if (document.fullscreenElement && document.exitFullscreen) {
      document.exitFullscreen().catch(() => {});
    } else if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
    pendingFullscreen = false;
  }
}

// Listen to every possible rotation signal — browsers differ
window.addEventListener('orientationchange', onOrientationMaybeChanged);
window.addEventListener('resize', onOrientationMaybeChanged);
if (window.matchMedia) {
  const mq = window.matchMedia('(orientation: landscape)');
  if (mq.addEventListener) mq.addEventListener('change', onOrientationMaybeChanged);
  else if (mq.addListener) mq.addListener(onOrientationMaybeChanged); // older Safari
}

// Consume the first gesture after rotating to landscape to actually enter fullscreen
const consumePendingFullscreen = () => {
  if (!pendingFullscreen) return;
  if (hasActiveFullscreen()) {
    pendingFullscreen = false;
    return;
  }
  requestFullscreenSafe();
};
document.addEventListener('touchend', consumePendingFullscreen, { passive: true });
document.addEventListener('click', consumePendingFullscreen);
